plugins {
    id 'java'
    id 'application'
    id 'com.github.johnrengelman.shadow' version '7.1.2'
}

group = 'edu.ej'
version = '1.0'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.xerial:sqlite-jdbc:3.43.0.0'
}

application {
    mainClass = 'edu.ej.student.API'
}
tasks.named('shadowJar') {
    archiveBaseName.set('EJ-Student-System')
    archiveVersion.set('1.0')
    archiveClassifier.set('all')
}
}